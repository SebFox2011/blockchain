<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Soldes - Blockchain Web</title>
    <style>
        body {
            font-size: small;
            font-family: Arial, sans-serif;
            margin: 20px;
            display: flex;
            flex-direction: column;
        }

        .amount-input {
            width: 70px;
        }

        .container {
            display: flex;
        }

        .users-container {
            margin-right: 50px;
        }

        .blockchain-container {
            width: 30%;
        }

        .blockchain-history {
            width: 30%;
        }

        input,
        button {
            padding: 5px;
            margin: 5px;
        }

        * .user {
            margin-bottom: 20px;
        }

        .block {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
        }

        .block strong {
            display: block;
        }

        #blockchain-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }



        #status-icon {
            color: green;
            /* Par défaut, vert */
        }

        #blockchain {
            max-height: 692px;
            /* Limite la hauteur à 5 blocs */
            overflow-y: auto;
            /* Barre de défilement verticale */
            border: 1px solid #ccc;
            /* Définir une bordure autour de la section */
            padding: 10px;
            margin-top: 20px;
            padding-bottom: 0;
        }

        #blockchain-list {
            max-height: 740px;
            /* Limite la hauteur à 5 blocs */
            overflow-y: auto;
            /* Barre de défilement verticale */
            border: 1px solid #ccc;
            /* Définir une bordure autour de la section */
            padding: 10px;
            margin-top: 20px;
        }

        .user-history {
            max-height: 100px;
            max-width: 300px;
            /* Limite la hauteur de l'historique à 5 messages (ajuste la taille si nécessaire) */
            overflow-y: auto;
            /* Ajoute un ascenseur vertical pour défiler */
            border: 1px solid #ccc;
            /* Bordure pour délimiter la section */
            padding: 10px;
            margin-top: 20px;
            background-color: #f9f9f9;
        }
    </style>
</head>

<body>
    <div>
        <h1>Gestion des Soldes 5</h1>
    </div>
    <div class="container">
        <div>
            <h2>Liste des utilisateurs</h2>
            <div class="users-container" id="usersContainer">
        </div>
        </div>
        <div class="blockchain-container">
            <h2>Transactions Blockchain</h2>
            <div id="blockchain-status">
                <span id="status-icon" style="font-size: 24px;"></span>
                <span id="status-text"></span>
            </div>
            <div id="blockchain"></div>
        </div>
        <div class="blockchain-history">
            <h2>Historique Blockchain</h2>
            <div id="blockchain-list"></div>
        </div>
    </div>
    <!-- Lien vers le fichier JavaScript externe -->
    <script src="script.js"></script>
</body>

</html>
